const percentile = (val, arr) => {
  const sorted = [...arr].sort((a, b) => a - b);
  const idx = sorted.findIndex(v => v >= val);
  return idx === -1 ? 100 : (idx / sorted.length) * 100;
};

window.computeScores = (vips) => {
  const aums = vips.map(v => v.aum);
  const vols = vips.map(v => v.vol30d);

  return vips.map(v => {
    const aumPct = percentile(v.aum, aums);
    const volPct = percentile(v.vol30d, vols);
    const turnover = v.vol30d / v.aum;
    const breadthScore = Math.min(100, (v.products / 5) * 100);
    const breadthTurnover = breadthScore * Math.min(1, turnover / 20);
    const makerScore = v.makerRatio * 100;
    const activeScore = (v.activeDays / 30) * 100;
    const depositScore = Math.max(0, Math.min(100, 50 + v.depositTrend));
    const referralScore = Math.min(100, v.referrals * 8);

    const coreScore =
      0.46 * aumPct +
      0.31 * volPct +
      0.23 * breadthTurnover;

    const peripheralScore =
      0.40 * referralScore +
      0.40 * activeScore +
      0.20 * depositScore;

    const isHighValue    = v.aum > 1500000 || v.vol30d > 15000000;
    const isChurnRisk    = v.recencyDays > 7 || v.depositTrend < -10;
    const isUnderutilized = turnover < 5 && v.aum > 1000000;
    const isRisingStar   = v.depositTrend > 20 && v.activeDays > 20 && v.aum < 1500000;
    const isWhaleSleep   = v.aum > 1000000 && v.activeDays < 10;
    const isApiNew       = v.apiUser && v.products >= 3;
    const isCrossSell    = v.products <= 2 && v.aum > 200000;

    const triggers = [];
    if (isChurnRisk && isHighValue) triggers.push('C1');
    if (isWhaleSleep)               triggers.push('C2');
    if (isUnderutilized)            triggers.push('C3');
    if (isRisingStar)               triggers.push('C4');
    if (isCrossSell)                triggers.push('C5');
    if (isApiNew)                   triggers.push('C6');

    const inactivityTriggers = triggers.filter(t => ['C1','C2'].includes(t));
    const activityTriggers   = triggers.filter(t => ['C3','C4','C5','C6'].includes(t));
    const inInactivity = inactivityTriggers.length > 0;
    const inActivity   = activityTriggers.length > 0;
    const isSteady     = !inInactivity && !inActivity;

    let group;
    if (isSteady) group = 'Steady';
    else if (inInactivity && inActivity) group = 'Both';
    else if (inInactivity) group = 'Inactivity Risk';
    else group = 'Increasing Activity';

    const seedDays = (() => {
      const base = v.recencyDays + (v.activeDays > 25 ? 1 : v.activeDays > 15 ? 4 : 9);
      const adj  = v.aum > 5000000 ? -2 : v.aum > 1500000 ? 0 : 2;
      return Math.max(1, base + adj);
    })();
    const lastContactDays = seedDays;

    const channelByRegion = {
      CN: 'WeChat', HK: 'WeChat', TW: 'WeChat',
      RU: 'Telegram', UA: 'Telegram', TR: 'Telegram', VN: 'Telegram', TH: 'Telegram',
      KR: 'Telegram', PH: 'Telegram', IN: 'Telegram', NG: 'Telegram',
      AE: 'Phone',   BVI: 'Phone',   GB: 'Email',
      JP: 'Email',   SE: 'Email',    SG: 'Telegram',
      MX: 'Email',   BR: 'Email',    AR: 'Email',
      US: 'Email',
    };
    let lastContactMode = channelByRegion[v.region] || 'Email';
    if (v.aum > 8000000) lastContactMode = 'Phone';
    if (lastContactDays > 21) lastContactMode = 'None';

    return {
      ...v,
      score: Math.round(coreScore),
      peripheralScore: Math.round(peripheralScore),
      turnover,
      group,
      triggers,
      inactivityTriggers,
      activityTriggers,
      lastContactDays,
      lastContactMode,
      coreBreakdown: {
        aum:     Math.round(0.46 * aumPct),
        vol:     Math.round(0.31 * volPct),
        breadth: Math.round(0.23 * breadthTurnover),
      },
      rawScores: { aumPct, volPct, breadthTurnover, makerScore, activeScore, depositScore, referralScore, turnover },
      peripheralBreakdown: {
        referral: Math.round(0.40 * referralScore),
        active:   Math.round(0.40 * activeScore),
        deposit:  Math.round(0.20 * depositScore),
      },
    };
  });
};

// ---- RFM SCATTER ----
const RFMScatter = ({ vips, onSelect, selectedId }) => {
  const maxVol     = Math.max(...vips.map(v => v.vol30d));
  const maxRecency = 20;
  const plotRef    = useRef(null);
  const [size, setSize] = useState({ w: 600, h: 280 });

  useEffect(() => {
    if (!plotRef.current) return;
    const measure = () => {
      const r = plotRef.current.getBoundingClientRect();
      if (r.width && r.height) setSize({ w: r.width, h: r.height });
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(plotRef.current);
    return () => ro.disconnect();
  }, []);

  const positioned = useMemo(() => {
    const W = Math.max(40, size.w);
    const H = Math.max(40, size.h);
    const items = vips.map(v => {
      const x0 = ((maxRecency - Math.min(v.recencyDays, maxRecency)) / maxRecency) * W;
      const y0 = H - (Math.log10(v.vol30d + 1) / Math.log10(maxVol + 1)) * H;
      const r  = (5 + (v.activeDays / 30) * 16) / 2;
      return { v, x: x0, y: y0, ax: x0, ay: y0, r };
    });
    const GAP = 1.5;
    const clamp = (it) => {
      it.x = Math.max(it.r, Math.min(W - it.r, it.x));
      it.y = Math.max(it.r, Math.min(H - it.r, it.y));
    };
    for (let i = 0; i < items.length; i++)
      for (let j = i + 1; j < items.length; j++)
        if (items[i].x === items[j].x && items[i].y === items[j].y) {
          items[j].x += (Math.random() - 0.5) * 2;
          items[j].y += (Math.random() - 0.5) * 2;
        }
    for (let iter = 0; iter < 400; iter++) {
      let moved = 0;
      for (let i = 0; i < items.length; i++) {
        for (let j = i + 1; j < items.length; j++) {
          const a = items[i], b = items[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          let d = Math.hypot(dx, dy);
          const minD = a.r + b.r + GAP;
          if (d < minD) {
            if (d < 0.0001) {
              const ang = Math.random() * Math.PI * 2;
              a.x -= Math.cos(ang) * minD * 0.5; a.y -= Math.sin(ang) * minD * 0.5;
              b.x += Math.cos(ang) * minD * 0.5; b.y += Math.sin(ang) * minD * 0.5;
            } else {
              const push = (minD - d) / 2;
              const ux = dx / d, uy = dy / d;
              a.x -= ux * push; a.y -= uy * push;
              b.x += ux * push; b.y += uy * push;
            }
            moved += (minD - d);
          }
        }
      }
      for (const it of items) clamp(it);
      if (moved < 0.05) break;
    }
    return items.map(it => ({
      v: it.v,
      x: Math.max(it.r, Math.min(W - it.r, it.x)),
      y: Math.max(it.r, Math.min(H - it.r, it.y)),
      r: it.r,
    }));
  }, [vips, size.w, size.h, maxVol]);

  return (
    <div className="relative h-[380px] bg-paper2/60 border border-ink/80">
      <div className="absolute top-0 left-0 right-0 hairline-b px-3 py-1.5 flex items-center justify-between bg-paper z-10">
        <div className="font-display font-medium text-[13px] text-ink leading-none">
          Recency × Monetary, with Frequency by Mark Size
        </div>
        <div className="font-mono text-[9px] smallcaps text-ink3">n = {vips.length} · log-scale Y</div>
      </div>

      <div className="absolute left-0 top-9 bottom-9 w-7 flex items-center justify-center pointer-events-none">
        <div className="-rotate-90 whitespace-nowrap font-mono text-[9px] smallcaps text-ink3">
          ← thin · 30-day volume (log) · thick →
        </div>
      </div>

      <div ref={plotRef} className="absolute left-7 right-3 top-9 bottom-9 border-l border-b border-ink">
        {[20,40,60,80].map(p => (
          <div key={`h${p}`} className="absolute left-0 right-0 border-t border-ink/15" style={{ top: `${100-p}%` }} />
        ))}
        {[20,40,60,80].map(p => (
          <div key={`v${p}`} className="absolute top-0 bottom-0 border-l border-ink/15" style={{ left: `${p}%` }} />
        ))}
        <div className="absolute left-0 right-0 border-t border-dashed border-ink/45" style={{ top: '50%' }} />
        <div className="absolute top-0 bottom-0 border-l border-dashed border-ink/45" style={{ left: '50%' }} />
        <div className="absolute top-1.5 right-2 text-[10px] font-mono smallcaps text-ink2">High value · Active</div>
        <div className="absolute top-1.5 left-2 text-[10px] font-mono smallcaps text-[#7A540F]">High value · Sleeping</div>
        <div className="absolute bottom-1.5 right-2 text-[10px] font-mono smallcaps text-ink3">Low value · Active</div>
        <div className="absolute bottom-1.5 left-2 text-[10px] font-mono smallcaps text-ink3">Dormant</div>

        {positioned.map(({ v, x, y, r }) => {
          const isSelected = v.id === selectedId;
          const dotColorKey =
            v.group === 'Both'               ? 'gold'    :
            v.group === 'Inactivity Risk'    ? 'oxblood' :
            v.group === 'Increasing Activity'? 'olive'   : 'ink3';
          const dotColor = colorHex[dotColorKey];
          const d = r * 2;
          return (
            <button key={v.id} onClick={() => onSelect(v.id)}
              className="absolute transition-transform hover:scale-[1.4] hover:z-10"
              style={{ left: `${x-r}px`, top: `${y-r}px`, width: `${d}px`, height: `${d}px` }}
              title={`${v.name} · ${v.group}${v.triggers.length ? ' · ' + v.triggers.join(', ') : ''}`}>
              <span className="block rounded-full" style={{
                width: '100%', height: '100%',
                background: dotColor,
                border: isSelected ? `2px solid ${PAL.ink}` : `1px solid ${PAL.ink}`,
                boxShadow: isSelected ? `0 0 0 3px ${PAL.paper}, 0 0 0 4px ${PAL.ink}` : 'none',
                opacity: isSelected ? 1 : 0.88,
              }} />
            </button>
          );
        })}
      </div>

      <div className="absolute left-7 right-3 bottom-0 hairline-t bg-paper px-3 py-1.5 flex items-center justify-between">
        <div className="font-mono text-[9px] smallcaps text-ink3">← stale &nbsp;|&nbsp; recency (days since last trade) &nbsp;|&nbsp; recent →</div>
        <div className="font-mono text-[9px] smallcaps text-ink3">mark ⌀ ∝ active days</div>
      </div>
    </div>
  );
};

// 60-DAY ACCOUNT REPORT — structured data for the React renderer
// =========================================================================
const buildReport = (vip) => {
  const turnoverStrength =
    vip.turnover >= 15 ? 'Strong'   :
    vip.turnover >= 8  ? 'Healthy'  :
    vip.turnover >= 3  ? 'Moderate' :
    'Weak';

  const makerRead =
    vip.makerRatio >= 0.7 ? 'Professional / market-maker flow' :
    vip.makerRatio >= 0.4 ? 'Mixed limit and market activity'   :
    'Taker-heavy retail flow';

  const depositRead =
    vip.depositTrend >= 25 ? 'Capital migrating in — strong commitment'    :
    vip.depositTrend >= 5  ? 'Net positive — modest expansion'              :
    vip.depositTrend > -5  ? 'Flat — neither growing nor shrinking'         :
    vip.depositTrend > -15 ? 'Net outflow — early withdrawal signal'        :
    'Significant capital flight — competitor migration risk';

  const engagementRead =
    vip.activeDays >= 25 ? 'Daily presence — habitual'              :
    vip.activeDays >= 15 ? 'Steady — regular but not constant'       :
    vip.activeDays >= 7  ? 'Episodic — opportunistic engagement'     :
    'Dormant — multi-week silence';

  const productMix =
    vip.products === 5 ? 'Fully diversified across all 5 product lines' :
    vip.products >= 4  ? 'Broadly engaged — one product gap to close'   :
    vip.products >= 3  ? 'Mid-breadth — meaningful cross-sell room'      :
    vip.products >= 2  ? 'Narrow — clear cross-sell opportunity'         :
    'Single-product user — significant expansion runway';

  // Recommended action
  const primary = vip.triggers[0];
  const action =
    primary === 'C1' ? 'Immediate re-engagement. Audit fee tier vs competitors; offer match. Schedule call within 48h.' :
    primary === 'C2' ? 'Activate idle capital. Pitch BTC Yield+, Dual Investment, or 30-min strategy call.' :
    primary === 'C3' ? 'Unlock latent volume. Custom fee proposal, private Earn rates, Launchpad allocation.' :
    primary === 'C4' ? 'Fast-track to Rising Star pre-VIP tier. Lock in fee schedule before competitor outreach.' :
    primary === 'C5' ? 'Cross-sell into Futures, Earn, and Copy Trading. Offer comp on first 10 derivative trades.' :
    primary === 'C6' ? 'Lock in API infrastructure: co-location, raised rate limits, dedicated tech contact.'      :
    'Maintain. Light-touch monthly check-in; surface new launches and tier benefits.';

  return {
    period: 'Trailing 60 days · point-in-time snapshot',

    headline: [
      { label: 'Group',       value: vip.group },
      { label: 'Triggers',    value: vip.triggers.length ? vip.triggers.join(' · ') : 'None firing' },
      { label: 'Last contact', value: vip.lastContactMode === 'None' ? 'Never recorded' : `${vip.lastContactMode} · ${vip.lastContactDays}d ago` },
      { label: 'External',    value: vip.competitorTier || 'No external tier on file' },
    ],

    capital: [
      { label: 'Assets under management', value: fmtUSD(vip.aum) },
      { label: '30-day trading volume',   value: fmtUSD(vip.vol30d) },
      { label: 'Volume / AUM turnover',   value: `${vip.turnover.toFixed(1)}× — ${turnoverStrength}` },
      { label: 'Average ticket size',     value: fmtUSD(vip.avgTrade) },
      { label: '90-day net deposit trend', value: `${vip.depositTrend > 0 ? '+' : ''}${vip.depositTrend}% — ${depositRead}` },
    ],

    engagement: [
      { label: 'Active days (of last 30)',  value: `${vip.activeDays} — ${engagementRead}` },
      { label: 'Days since last trade',     value: `${vip.recencyDays}` },
      { label: 'Distinct pairs traded',     value: `${vip.pairs}` },
      { label: 'Withdrawal frequency',      value: vip.withdrawFreq.charAt(0).toUpperCase() + vip.withdrawFreq.slice(1) },
      { label: 'Referrals booked (90d)',    value: `${vip.referrals}` },
    ],

    flow: [
      { label: 'Maker share of flow',    value: `${(vip.makerRatio*100).toFixed(0)}% — ${makerRead}` },
      { label: 'Product breadth',        value: `${vip.products} of 5 — ${productMix}` },
      { label: 'API integration',        value: vip.apiUser ? 'Active' : 'Not engaged' },
    ],

    scoring: [
      { label: 'Core Score',       value: `${vip.score} / 100` },
      { label: 'Peripheral Score', value: `${vip.peripheralScore} / 100` },
      { label: 'AUM percentile',   value: `${vip.rawScores.aumPct.toFixed(0)}` },
      { label: 'Volume percentile', value: `${vip.rawScores.volPct.toFixed(0)}` },
    ],

    action,
  };
};

              )}
            </div>

            <div className="hairline-t pt-2 mt-2 font-mono text-[9px] smallcaps text-ink3">
              Last refreshed · {fmtDateInline()}
            </div>
          </aside>

          {/* SELECTED ACCOUNT */}
          <main className="col-span-8 space-y-6">
            {selected && (
              <>
                <article className="pt-1">
                  <div className="flex items-baseline justify-between mb-2">
                    <div className="font-mono text-[10px] smallcaps text-[#822026]">Selected Account</div>
                    <div className="font-mono text-[10px] smallcaps text-ink3">{selected.id}</div>
                  </div>

                  <div className="grid grid-cols-12 gap-6 items-end pb-4 hairline-b">
                    <div className="col-span-8">
                      <h2 className="font-display font-bold text-[52px] leading-[0.95] tracking-tight text-ink">{selected.name}</h2>
                      <div className="mt-3 flex flex-wrap items-center gap-3">
                        <window.GroupBadge group={selected.group} size="md" />
                        <span className="font-mono text-[10px] smallcaps text-ink3">Region</span>
                        <span className="font-display text-[14px] text-ink">{selected.region}</span>
                        {selected.competitorTier && (
                          <>
                            <span className="text-ink3">·</span>
                            <span className="font-mono text-[10px] smallcaps text-ink3">External tier</span>
                            <span className="font-display text-[14px] text-ink">{selected.competitorTier}</span>
                            <span className="stamp text-[8px] px-1.5 py-0.5 -translate-y-0.5">Match Available</span>
                          </>
                        )}
                      </div>
                      {selected.triggers.length > 0 && (
                        <div className="mt-3 flex items-center gap-1.5 flex-wrap">
                          <span className="font-mono text-[9px] smallcaps text-ink3 mr-1">Triggers</span>
                          {selected.triggers.map(t => <window.TriggerPill key={t} id={t} size="md" />)}
                        </div>
                      )}
                      <div className="mt-2.5">
                        <span className="font-mono text-[9px] smallcaps text-ink3 mr-2">Last contact</span>
                        <window.LastContact days={selected.lastContactDays} mode={selected.lastContactMode} size="md" />
                      </div>
                    </div>

                    <div className="col-span-4 grid grid-cols-2 border border-ink/80 bg-paper2/55">
                      <div className="p-3 border-r border-ink/80">
                        <div className="font-mono text-[9px] smallcaps text-ink3">Core</div>
                        <div className="font-display tabular-nums font-bold text-[56px] leading-none text-ink">{selected.score}</div>
                        <div className="font-mono text-[10px] smallcaps text-ink3 mt-1">size · sophistication</div>
                      </div>
                      <div className="p-3">
                        <div className="font-mono text-[9px] smallcaps text-ink3">Peripheral</div>
                        <div className="font-display tabular-nums font-bold text-[56px] leading-none text-[#A47324]">{selected.peripheralScore}</div>
                        <div className="font-mono text-[10px] smallcaps text-ink3 mt-1">engagement quality</div>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-12 gap-6 pt-4">
                    <div className="col-span-7">
                      <div className="border border-ink/80">
                        <div className="grid grid-cols-3 hairline-b">
                          <Stat label="AUM"        val={window.fmtUSD(selected.aum)} />
                          <Stat label="30-day volume" val={window.fmtUSD(selected.vol30d)} accent="text-[#185660]" />
                          <Stat label="Turnover"   val={`${selected.turnover.toFixed(1)}×`} />
                        </div>
                        <div className="grid grid-cols-2">
                          <Stat label="Avg ticket"  val={window.fmtUSD(selected.avgTrade)} />
                          <Stat label="Maker share" val={`${(selected.makerRatio*100).toFixed(0)}%`} accent="text-[#6E2A4E]" />
                        </div>
                      </div>
                    </div>
                    <div className="col-span-5">
                      <button onClick={() => setShowReport(true)}
                        className="w-full h-full bg-ink hover:bg-[#3B342B] text-paper py-3 px-4 font-mono smallcaps text-[12px] flex items-center justify-between group transition">
                        <span className="flex items-center gap-2">
                          <Sparkles className="w-4 h-4 text-[#A47324]" />
                          <span>Open 60-day brief on {selected.name.split(' ')[0]}</span>
                        </span>
                        <ArrowUpRight className="w-4 h-4 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" />
                      </button>
                    </div>
                  </div>
                </article>

                <div className="grid grid-cols-12 gap-6">
                  <section className="col-span-7 pt-1">
                    <SectionHead title="Eleven Indicators" sub="Leading indicators of latent capacity" />
                    <div className="pt-2"><window.MetricProfile vip={selected} /></div>
                  </section>
                  <section className="col-span-5 pt-1">
                    <SectionHead title="Score Composition" sub="Two composites · one standalone gauge" />
                    <div className="pt-2"><window.ScoreBreakdown vip={selected} /></div>
                  </section>
                </div>

                <section className="pt-1">
                  <SectionHead title="Segmentation Map" sub="Recency × Monetary · mark size = active days · click any mark to inspect" />
                  <div className="pt-3 grid grid-cols-12 gap-6">
                    <div className="col-span-9">
                      <window.RFMScatter vips={scoredVips} onSelect={setSelectedId} selectedId={selectedId} />
                    </div>
                    <div className="col-span-3"><Legend /></div>
                  </div>
                </section>

                <footer className="hairline-t pt-3 pb-6 flex items-center justify-between font-mono text-[10px] smallcaps text-ink3">
                  <div>MEXC VIP Desk · Relationship Manager Console</div>
                  <div>Core = .46 AUM + .31 Vol + .23 Breadth×TOR · Peripheral = .40 Ref + .40 Active + .20 Deposit</div>
                </footer>
              </>
            )}
          </main>
        </div>
        )}
      </div>
        </div>{/* /MAIN CONTENT AREA */}
      </div>{/* /flex */}

      {/* REPORT MODAL */}
      {showReport && selected && (() => {
        const report = window.buildReport(selected);
        const Section = ({ title, rows, dense }) => (
          <div className="mb-5">
            <div className="font-mono text-[10px] smallcaps text-[#822026] hairline-b pb-1 mb-2">{title}</div>
            <div className={dense ? 'grid grid-cols-2 gap-x-6 gap-y-1' : 'space-y-1.5'}>
              {rows.map(r => (
                <div key={r.label} className="flex items-baseline justify-between gap-3 hairline-b py-1">
                  <span className="font-mono text-[10px] smallcaps text-ink3 flex-shrink-0">{r.label}</span>
                  <span className="font-display text-[13px] text-ink text-right leading-tight">{r.value}</span>
                </div>
              ))}
            </div>
          </div>
        );
        return (
          <div className="fixed inset-0 z-50 bg-[#1B1815]/85 flex items-center justify-center p-6 overflow-y-auto" onClick={() => setShowReport(false)}>
            <div className="bg-paper border-[1.5px] border-ink max-w-[760px] w-full shadow-[8px_8px_0_#1B1815] my-auto" onClick={e => e.stopPropagation()}>

              {/* Report header */}
              <div className="px-7 pt-6 pb-4 hairline-b">
                <div className="flex items-start justify-between mb-3">
                  <div className="font-mono text-[10px] smallcaps text-[#822026]">Internal Account Brief</div>
                  <button onClick={() => setShowReport(false)} className="text-ink2 hover:text-ink">
                    <X className="w-5 h-5" />
                  </button>
                </div>
                <div className="font-display font-bold text-[34px] leading-[1.05] tracking-tight text-ink">{selected.name}</div>
                <div className="mt-1 flex items-center gap-3 font-mono text-[10px] smallcaps text-ink3">
                  <span>{selected.id}</span>
                  <span>·</span>
                  <span>{selected.region}</span>
                  <span>·</span>
                  <span>{report.period}</span>
                </div>
              </div>

              {/* Report body */}
              <div className="px-7 py-5">
                <Section title="Headline"          rows={report.headline}   dense />
                <Section title="Capital & Flow"    rows={report.capital} />
                <Section title="Engagement"        rows={report.engagement} />
                <Section title="Trading Profile"   rows={report.flow} />
                <Section title="Scoring"           rows={report.scoring}    dense />

                {/* Recommended action */}
                <div>
                  <div className="font-mono text-[10px] smallcaps text-[#822026] hairline-b pb-1 mb-2">Recommended Action</div>
                  <div className="bg-paper2/70 border-l-[3px] border-[#822026] px-4 py-3 font-display text-[14px] leading-[1.55] text-ink">
                    {report.action}
                  </div>
                </div>
              </div>

              {/* Footer / actions */}
              <div className="px-7 py-4 hairline-t bg-paper2/40 flex items-center justify-between">
                <div className="font-mono text-[9px] smallcaps text-ink3">
                  Compiled by · M. Kee, RM · {fmtDateInline()}
                </div>
                <div className="flex items-center gap-3">
                  <button onClick={() => window.print()}
                    className="font-mono text-[10px] smallcaps text-ink2 hover:text-ink underline underline-offset-4 decoration-[#A47324]">
                    Print / Save PDF
                  </button>
                  <button onClick={handleCopy}
                    className="px-5 py-2.5 bg-[#822026] hover:bg-[#5B161B] text-paper font-mono text-[11px] smallcaps tracking-widest flex items-center gap-2 transition">
                    {copied
                      ? (<><Check className="w-4 h-4" /><span>Copied to clipboard</span></>)
                      : (<><Copy className="w-4 h-4" /><span>Copy as text</span></>)}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function SectionHead({ title, sub }) {
  return (
    <div className="hairline-b pb-2 mb-2">
      <h3 className="font-display font-semibold text-[28px] leading-[0.95] text-ink">{title}</h3>
      {sub && <div className="font-mono text-[11px] smallcaps text-ink3 mt-1.5">{sub}</div>}
    </div>
  );
}

function Stat({ label, val, accent = '' }) {
  return (
    <div className="px-3 py-2.5">
      <div className="font-mono text-[9px] smallcaps text-ink3">{label}</div>
      <div className={`font-display tabular-nums font-semibold text-[20px] leading-tight ${accent || 'text-ink'}`}>{val}</div>
    </div>
  );
}

function Legend() {
  const items = [
    { color: 'oxblood', label: 'Inactivity Risk',    desc: 'Churning or sleeping' },
    { color: 'olive',   label: 'Increasing Activity', desc: 'Capacity to grow' },
    { color: 'gold',    label: 'Cross-Pressure',      desc: 'Both pressures present' },
    { color: 'ink3',    label: 'Steady Hand',          desc: 'Healthy baseline' },
  ];
  return (
    <div className="border border-ink/80 p-3 space-y-3 bg-paper2/55">
      <div className="font-mono text-[9px] smallcaps text-ink3 hairline-b pb-1">Legend</div>
      {items.map(it => (
        <div key={it.label} className="flex items-start gap-2">
          <span className="w-3 h-3 mt-1 border border-ink rounded-full" style={{ backgroundColor: window.colorHex[it.color] }} />
          <div>
            <div className="font-display font-medium text-[14px] text-ink leading-tight">{it.label}</div>
            <div className="font-mono text-[9px] smallcaps text-ink3 leading-tight mt-0.5">{it.desc}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function sortByLabel(k) {
  return ({ score: 'core score', peripheral: 'peripheral score', aum: 'AUM', volume: '30-d volume', turnover: 'turnover (most underused first)' })[k] || k;
}

function fmtDateInline() {
  const d = new Date(2026, 4, 10, 17, 30);
  return `${d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })}, ${d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })} HKT`;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
